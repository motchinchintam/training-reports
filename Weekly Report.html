<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Báo cáo tuần / Weekly Report – Template</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-secondary: #f5f5f3;
    --text-primary: #1a1a1a; --text-secondary: #666; --text-tertiary: #999;
    --border: rgba(0,0,0,0.12); --border-secondary: rgba(0,0,0,0.22);
    --radius-md: 8px; --radius-lg: 12px;
    --blue-bg: #E6F1FB; --blue-text: #185FA5;
    --green-bg: #EAF3DE; --green-text: #3B6D11;
    --coral-bg: #FAECE7; --coral-text: #993C1D;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1e; --bg-secondary: #2a2a2a;
      --text-primary: #f0f0f0; --text-secondary: #aaa; --text-tertiary: #666;
      --border: rgba(255,255,255,0.1); --border-secondary: rgba(255,255,255,0.2);
      --blue-bg: #0C447C; --blue-text: #B5D4F4;
      --green-bg: #27500A; --green-text: #C0DD97;
      --coral-bg: #712B13; --coral-text: #F5C4B3;
    }
  }
  body { font-family: 'Segoe UI','Helvetica Neue',Arial,sans-serif; background: var(--bg-secondary); color: var(--text-primary); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 800px; margin: 0 auto; background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 2rem; }

  .lang-bar { display: flex; justify-content: flex-end; margin-bottom: 1.25rem; }
  .lang-toggle { display: flex; border: 0.5px solid var(--border-secondary); border-radius: 20px; overflow: hidden; }
  .lang-btn { padding: 5px 14px; font-size: 12px; font-weight: 500; cursor: pointer; background: none; border: none; color: var(--text-secondary); font-family: inherit; transition: background 0.15s, color 0.15s; white-space: nowrap; }
  .lang-btn.active { background: #185FA5; color: #fff; }

  .doc-title { font-size: 20px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
  .doc-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 1.25rem; }

  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.75rem; padding-bottom: 1.5rem; border-bottom: 1.5px solid var(--border); }
  .meta-item label { font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .meta-item input, .meta-item select { width: 100%; border: 0.5px solid var(--border-secondary); border-radius: var(--radius-md); padding: 8px 10px; font-size: 13px; background: var(--bg-secondary); color: var(--text-primary); font-family: inherit; outline: none; transition: border-color 0.2s; }
  .meta-item input:focus, .meta-item select:focus { border-color: #185FA5; background: var(--bg); }

  .section { margin-bottom: 1.25rem; border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 0.5px solid var(--border); background: var(--bg-secondary); }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .badge-progress { background: var(--green-bg); color: var(--green-text); }
  .badge-plan { background: var(--blue-bg); color: var(--blue-text); }
  .badge-problem { background: var(--coral-bg); color: var(--coral-text); }
  .section-title { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .t-sub { font-size: 11px; color: var(--text-secondary); font-weight: 400; margin-left: 4px; }

  .section-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; gap: 8px; align-items: flex-start; }
  .row-num { font-size: 12px; color: var(--text-secondary); padding-top: 8px; min-width: 18px; text-align: right; flex-shrink: 0; }
  .row-inputs { flex: 1; display: flex; gap: 6px; }
  .input-wrap { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .input-lang-label { font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.04em; text-transform: uppercase; padding-left: 2px; }
  .row-input { width: 100%; border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 7px 10px; font-size: 13px; background: var(--bg-secondary); color: var(--text-primary); font-family: inherit; resize: none; line-height: 1.5; min-height: 36px; outline: none; transition: border-color 0.2s, background 0.2s; }
  .row-input:focus { border-color: var(--border-secondary); background: var(--bg); }
  .row-input.vi { border-left: 2px solid #185FA5; }
  .row-input.en { border-left: 2px solid #3B6D11; }

  .row-del { padding-top: 8px; cursor: pointer; font-size: 14px; color: var(--text-tertiary); background: none; border: none; transition: color 0.15s; flex-shrink: 0; }
  .row-del:hover { color: #E24B4A; }
  .add-btn { font-size: 12px; color: var(--text-secondary); background: none; border: 0.5px dashed var(--border-secondary); border-radius: var(--radius-md); padding: 6px 12px; cursor: pointer; width: 100%; margin-top: 4px; font-family: inherit; transition: background 0.15s; }
  .add-btn:hover { background: var(--bg-secondary); }

  .divider { border: none; border-top: 0.5px solid var(--border); margin: 1.5rem 0; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn { flex: 1; padding: 10px 16px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.15s, transform 0.1s; min-width: 140px; }
  .btn:active { transform: scale(0.98); }
  .btn-outline { border: 0.5px solid var(--border-secondary); background: var(--bg); color: var(--text-primary); }
  .btn-outline:hover { background: var(--bg-secondary); }
  .btn-primary { border: none; background: #185FA5; color: #fff; }
  .btn-primary:hover { background: #0C447C; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #3B6D11; color: #fff; font-size: 13px; padding: 9px 20px; border-radius: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }

  @media (max-width: 560px) {
    .meta-grid { grid-template-columns: 1fr; }
    .container { padding: 1.25rem; }
    .row-inputs { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="lang-bar">
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('vi',this)">🇻🇳 Tiếng Việt</button>
      <button class="lang-btn" onclick="setLang('bilingual',this)">🌐 Song ngữ</button>
      <button class="lang-btn" onclick="setLang('en',this)">🇬🇧 English</button>
    </div>
  </div>

  <div class="doc-title" id="doc-title">📋 Báo cáo tuần</div>
  <div class="doc-subtitle" id="doc-subtitle">Template báo cáo nội bộ</div>

  <div class="meta-grid">
    <div class="meta-item"><label id="lbl-reporter">Người báo cáo</label><input type="text" id="reporter" placeholder="Họ và tên" /></div>
    <div class="meta-item"><label id="lbl-dept">Bộ phận</label><input type="text" id="dept" placeholder="VD: IT / Nhân sự / Marketing" /></div>
    <div class="meta-item"><label id="lbl-week-past">Tuần trước</label><input type="text" id="week-past" placeholder="VD: 31/03 – 06/04/2026" /></div>
    <div class="meta-item"><label id="lbl-week-next">Tuần này</label><input type="text" id="week-next" placeholder="VD: 07/04 – 13/04/2026" /></div>
    <div class="meta-item"><label id="lbl-receiver">Gửi đến</label><input type="text" id="receiver" placeholder="VD: Trưởng bộ phận Nhân Sự" /></div>
    <div class="meta-item">
      <label id="lbl-type">Loại báo cáo</label>
      <select id="report-type">
        <option value="Báo cáo tuần|Weekly Report">Báo cáo tuần / Weekly Report</option>
        <option value="Báo cáo tháng|Monthly Report">Báo cáo tháng / Monthly Report</option>
        <option value="Báo cáo dự án|Project Report">Báo cáo dự án / Project Report</option>
        <option value="Báo cáo tiến độ|Progress Report">Báo cáo tiến độ / Progress Report</option>
      </select>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="badge badge-progress" id="badge-past">✓ Tuần trước</span>
      <span class="section-title"><span id="ttl-past-vi">Kết quả đã hoàn thành</span><span class="t-sub" id="ttl-past-en"></span></span>
    </div>
    <div class="section-body" id="progress-list"></div>
    <div style="padding:0 14px 12px;"><button class="add-btn" id="add-progress" onclick="addRow('progress-list','progress')">+ Thêm mục</button></div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="badge badge-plan" id="badge-next">→ Tuần này</span>
      <span class="section-title"><span id="ttl-next-vi">Kế hoạch thực hiện</span><span class="t-sub" id="ttl-next-en"></span></span>
    </div>
    <div class="section-body" id="plan-list"></div>
    <div style="padding:0 14px 12px;"><button class="add-btn" id="add-plan" onclick="addRow('plan-list','plan')">+ Thêm mục</button></div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="badge badge-problem" id="badge-prob">! Vấn đề</span>
      <span class="section-title"><span id="ttl-prob-vi">Khó khăn / Cần hỗ trợ</span><span class="t-sub" id="ttl-prob-en"></span></span>
    </div>
    <div class="section-body" id="problem-list"></div>
    <div style="padding:0 14px 12px;"><button class="add-btn" id="add-problem" onclick="addRow('problem-list','problem')">+ Thêm mục</button></div>
  </div>

  <hr class="divider" />
  <div class="actions">
    <button class="btn btn-outline" id="btn-copy" onclick="copyText()">📋 Sao chép văn bản</button>
    <button class="btn btn-primary" id="btn-print" onclick="window.print()">🖨 In / Xuất PDF</button>
  </div>
</div>
<div class="toast" id="toast">✓ Đã sao chép!</div>

<script>
let currentLang = 'vi';

const T = {
  vi: {
    docTitle:'📋 Báo cáo tuần', docSub:'Template báo cáo nội bộ',
    lblReporter:'Người báo cáo', lblDept:'Bộ phận', lblWeekPast:'Tuần trước',
    lblWeekNext:'Tuần này', lblReceiver:'Gửi đến', lblType:'Loại báo cáo',
    badgePast:'✓ Tuần trước', badgeNext:'→ Tuần này', badgeProb:'! Vấn đề',
    ttlPastVi:'Kết quả đã hoàn thành', ttlPastEn:'',
    ttlNextVi:'Kế hoạch thực hiện', ttlNextEn:'',
    ttlProbVi:'Khó khăn / Cần hỗ trợ', ttlProbEn:'',
    addProgress:'+ Thêm mục', addPlan:'+ Thêm mục', addProblem:'+ Thêm mục',
    btnCopy:'📋 Sao chép văn bản', btnPrint:'🖨 In / Xuất PDF',
    phReporter:'Họ và tên', phDept:'VD: IT / Nhân sự / Marketing',
    phWeek:'VD: 31/03 – 06/04/2026', phReceiver:'VD: Trưởng bộ phận Nhân Sự',
    phVi:{progress:'Mô tả kết quả đã hoàn thành...', plan:'Mô tả kế hoạch tuần tới...', problem:'Mô tả khó khăn / yêu cầu hỗ trợ...'},
    phEn:{progress:'Describe completed results...', plan:'Describe upcoming plans...', problem:'Describe issues or support needed...'},
  },
  en: {
    docTitle:'📋 Weekly Report', docSub:'Internal report template',
    lblReporter:'Reporter', lblDept:'Department', lblWeekPast:'Last week',
    lblWeekNext:'This week', lblReceiver:'To', lblType:'Report type',
    badgePast:'✓ Last week', badgeNext:'→ This week', badgeProb:'! Issues',
    ttlPastVi:'Completed results', ttlPastEn:'',
    ttlNextVi:'Upcoming plans', ttlNextEn:'',
    ttlProbVi:'Issues & support needed', ttlProbEn:'',
    addProgress:'+ Add item', addPlan:'+ Add item', addProblem:'+ Add item',
    btnCopy:'📋 Copy text', btnPrint:'🖨 Print / Export PDF',
    phReporter:'Full name', phDept:'E.g. IT / HR / Marketing',
    phWeek:'E.g. Mar 31 – Apr 6, 2026', phReceiver:'E.g. HR Manager',
    phVi:{progress:'Describe completed results...', plan:'Describe upcoming plans...', problem:'Describe issues or support needed...'},
    phEn:{progress:'', plan:'', problem:''},
  },
  bilingual: {
    docTitle:'📋 Báo cáo tuần / Weekly Report', docSub:'Song ngữ Việt – Anh / Bilingual VI – EN',
    lblReporter:'Người báo cáo / Reporter', lblDept:'Bộ phận / Department',
    lblWeekPast:'Tuần trước / Last week', lblWeekNext:'Tuần này / This week',
    lblReceiver:'Gửi đến / To', lblType:'Loại báo cáo / Report type',
    badgePast:'✓ Tuần trước / Last week', badgeNext:'→ Tuần này / This week', badgeProb:'! Vấn đề / Issues',
    ttlPastVi:'Kết quả đã hoàn thành', ttlPastEn:'/ Completed results',
    ttlNextVi:'Kế hoạch thực hiện', ttlNextEn:'/ Upcoming plans',
    ttlProbVi:'Khó khăn / Cần hỗ trợ', ttlProbEn:'/ Issues & support needed',
    addProgress:'+ Thêm mục / Add item', addPlan:'+ Thêm mục / Add item', addProblem:'+ Thêm mục / Add item',
    btnCopy:'📋 Sao chép / Copy', btnPrint:'🖨 In / Print & Export PDF',
    phReporter:'Họ và tên / Full name', phDept:'VD: IT / HR / Marketing',
    phWeek:'VD: 31/03 – 06/04/2026', phReceiver:'VD: HR Manager',
    phVi:{progress:'Mô tả kết quả (tiếng Việt)...', plan:'Mô tả kế hoạch (tiếng Việt)...', problem:'Mô tả khó khăn (tiếng Việt)...'},
    phEn:{progress:'Describe results (English)...', plan:'Describe plans (English)...', problem:'Describe issues (English)...'},
  }
};

const lists = {
  progress: { listId:'progress-list', addId:'add-progress', key:'addProgress' },
  plan: { listId:'plan-list', addId:'add-plan', key:'addPlan' },
  problem: { listId:'problem-list', addId:'add-problem', key:'addProblem' }
};

function applyLang(lang) {
  const t = T[lang];
  const isBi = lang === 'bilingual';
  const isEn = lang === 'en';

  document.getElementById('doc-title').textContent = t.docTitle;
  document.getElementById('doc-subtitle').textContent = t.docSub;
  document.getElementById('lbl-reporter').textContent = t.lblReporter;
  document.getElementById('lbl-dept').textContent = t.lblDept;
  document.getElementById('lbl-week-past').textContent = t.lblWeekPast;
  document.getElementById('lbl-week-next').textContent = t.lblWeekNext;
  document.getElementById('lbl-receiver').textContent = t.lblReceiver;
  document.getElementById('lbl-type').textContent = t.lblType;
  document.getElementById('badge-past').textContent = t.badgePast;
  document.getElementById('badge-next').textContent = t.badgeNext;
  document.getElementById('badge-prob').textContent = t.badgeProb;
  document.getElementById('ttl-past-vi').textContent = t.ttlPastVi;
  document.getElementById('ttl-past-en').textContent = t.ttlPastEn;
  document.getElementById('ttl-next-vi').textContent = t.ttlNextVi;
  document.getElementById('ttl-next-en').textContent = t.ttlNextEn;
  document.getElementById('ttl-prob-vi').textContent = t.ttlProbVi;
  document.getElementById('ttl-prob-en').textContent = t.ttlProbEn;
  document.getElementById('add-progress').textContent = t.addProgress;
  document.getElementById('add-plan').textContent = t.addPlan;
  document.getElementById('add-problem').textContent = t.addProblem;
  document.getElementById('btn-copy').textContent = t.btnCopy;
  document.getElementById('btn-print').textContent = t.btnPrint;
  document.getElementById('reporter').placeholder = t.phReporter;
  document.getElementById('dept').placeholder = t.phDept;
  document.getElementById('week-past').placeholder = t.phWeek;
  document.getElementById('week-next').placeholder = t.phWeek;
  document.getElementById('receiver').placeholder = t.phReceiver;

  // Update textareas
  ['progress','plan','problem'].forEach(type => {
    const listId = lists[type].listId;
    document.querySelectorAll(`#${listId} textarea.vi`).forEach(ta => {
      ta.placeholder = t.phVi[type];
    });
    document.querySelectorAll(`#${listId} .en-wrap`).forEach(el => {
      el.style.display = isBi ? '' : 'none';
    });
    document.querySelectorAll(`#${listId} .input-lang-label`).forEach(el => {
      el.style.display = isBi ? '' : 'none';
    });
  });
}

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyLang(lang);
}

function makeRow(type, num) {
  const t = T[currentLang];
  const isBi = currentLang === 'bilingual';
  const div = document.createElement('div');
  div.className = 'row';
  div.innerHTML = `
    <span class="row-num">${num}.</span>
    <div class="row-inputs">
      <div class="input-wrap">
        <div class="input-lang-label" style="display:${isBi?'':'none'}">🇻🇳 Tiếng Việt</div>
        <textarea class="row-input vi" rows="1" placeholder="${t.phVi[type]}" oninput="autoResize(this)"></textarea>
      </div>
      <div class="input-wrap en-wrap" style="display:${isBi?'':'none'}">
        <div class="input-lang-label" style="display:${isBi?'':'none'}">🇬🇧 English</div>
        <textarea class="row-input en" rows="1" placeholder="${t.phEn[type]}" oninput="autoResize(this)"></textarea>
      </div>
    </div>
    <button class="row-del" onclick="delRow(this)">✕</button>`;
  return div;
}

function initList(listId, type, count) {
  const list = document.getElementById(listId);
  for (let i = 0; i < count; i++) list.appendChild(makeRow(type, i+1));
}

function addRow(listId, type) {
  const list = document.getElementById(listId);
  const num = list.querySelectorAll('.row').length + 1;
  list.appendChild(makeRow(type, num));
}

function delRow(btn) {
  const row = btn.closest('.row');
  const list = row.parentElement;
  if (list.querySelectorAll('.row').length > 1) {
    row.remove();
    list.querySelectorAll('.row-num').forEach((n,i) => n.textContent = (i+1) + '.');
  }
}

function autoResize(el) { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }

function v(id) { return document.getElementById(id).value.trim(); }

function getItems(listId) {
  return Array.from(document.querySelectorAll(`#${listId} .row`)).map((row, i) => {
    const vi = row.querySelector('textarea.vi')?.value.trim() || '';
    const en = row.querySelector('textarea.en')?.value.trim() || '';
    if (currentLang === 'bilingual') return `${i+1}. ${vi || '(chưa điền)'}\n   [EN] ${en || '(not filled)'}`;
    if (currentLang === 'en') return `${i+1}. ${vi || '(not filled)'}`;
    return `${i+1}. ${vi || '(chưa điền)'}`;
  }).join('\n');
}

function getType() {
  const val = document.getElementById('report-type').value;
  const [vi, en] = val.split('|');
  if (currentLang === 'en') return en;
  if (currentLang === 'bilingual') return `${vi} / ${en}`;
  return vi;
}

function buildText() {
  const r = v('reporter')||'___', d = v('dept')||'___';
  const wp = v('week-past')||'___', wn = v('week-next')||'___';
  const to = v('receiver')||'___';
  const type = getType().toUpperCase();
  if (currentLang === 'en') return `${type} – ${d}\nReporter: ${r}\nTo: ${to}\n\n📅 LAST WEEK (${wp})\nCompleted results:\n${getItems('progress-list')}\n\n📅 THIS WEEK (${wn})\nUpcoming plans:\n${getItems('plan-list')}\n\n⚠ ISSUES / SUPPORT NEEDED:\n${getItems('problem-list')}`;
  if (currentLang === 'bilingual') return `${type} – ${d}\nNgười báo cáo / Reporter: ${r}\nGửi đến / To: ${to}\n\n📅 TUẦN TRƯỚC / LAST WEEK (${wp})\nKết quả đã hoàn thành / Completed results:\n${getItems('progress-list')}\n\n📅 TUẦN NÀY / THIS WEEK (${wn})\nKế hoạch thực hiện / Upcoming plans:\n${getItems('plan-list')}\n\n⚠ KHÓ KHĂN / ISSUES:\n${getItems('problem-list')}`;
  return `${type} – ${d}\nNgười báo cáo: ${r}\nGửi đến: ${to}\n\n📅 TUẦN TRƯỚC (${wp})\nKết quả đã hoàn thành:\n${getItems('progress-list')}\n\n📅 TUẦN NÀY (${wn})\nKế hoạch thực hiện:\n${getItems('plan-list')}\n\n⚠ KHÓ KHĂN / CẦN HỖ TRỢ:\n${getItems('problem-list')}`;
}

function copyText() {
  navigator.clipboard.writeText(buildText()).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  });
}

// Init
initList('progress-list','progress',2);
initList('plan-list','plan',2);
initList('problem-list','problem',1);
</script>
</body>
</html>
