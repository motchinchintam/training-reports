<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Test & Assessment Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#ebebea;
  --tx:#1a1a1a;--tx2:#666;--tx3:#999;
  --bd:rgba(0,0,0,0.12);--bd2:rgba(0,0,0,0.22);
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-tx:#0C447C;
  --green:#3B6D11;--green-bg:#EAF3DE;--green-tx:#27500A;
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-tx:#633806;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-tx:#791F1F;
  --r:8px;--rl:12px
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1e;--bg2:#2a2a2a;--bg3:#333;
  --tx:#f0f0f0;--tx2:#aaa;--tx3:#666;
  --bd:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.2);
  --blue-bg:#0C447C;--blue-tx:#B5D4F4;
  --green-bg:#27500A;--green-tx:#C0DD97;
  --amber-bg:#633806;--amber-tx:#FAC775;
  --red-bg:#791F1F;--red-tx:#F7C1C1;
}}
body{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg2);color:var(--tx);min-height:100vh;padding:2rem 1rem}
.page{max-width:900px;margin:0 auto}
h1{font-size:20px;font-weight:500;margin-bottom:1.5rem;color:var(--tx)}
.card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:1.25rem}
.card-header{padding:12px 18px;border-bottom:0.5px solid var(--bd);background:var(--bg2);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.card-body{padding:16px 18px}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-blue{background:var(--blue-bg);color:var(--blue-tx)}
.badge-green{background:var(--green-bg);color:var(--green-tx)}

.settings-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.field label{font-size:11px;color:var(--tx2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.field input{width:100%;border:0.5px solid var(--bd2);border-radius:var(--r);padding:7px 10px;font-size:13px;background:var(--bg2);color:var(--tx);font-family:inherit;outline:none}
.field input:focus{border-color:var(--blue);background:var(--bg)}

.test-tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--bd2);background:var(--bg);color:var(--tx2);transition:all .15s;user-select:none}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.add-tab-btn{padding:5px 12px;border-radius:20px;font-size:12px;border:0.5px dashed var(--bd2);background:none;color:var(--tx2);cursor:pointer;font-family:inherit}
.add-tab-btn:hover{border-color:var(--blue);color:var(--blue)}

table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:8px 10px;font-size:11px;font-weight:500;color:var(--tx2);border-bottom:0.5px solid var(--bd);text-transform:uppercase;letter-spacing:.04em;background:var(--bg2)}
tbody td{padding:7px 10px;border-bottom:0.5px solid var(--bd);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg2)}

.name-input{border:none;background:transparent;color:var(--tx);font-size:13px;width:130px;outline:none;font-family:inherit}
.score-input{width:64px;border:0.5px solid var(--bd);border-radius:6px;padding:4px 8px;font-size:13px;background:var(--bg2);color:var(--tx);font-family:inherit;outline:none;text-align:center}
.score-input:focus{border-color:var(--blue);background:var(--bg)}

.pct-cell{font-weight:500;font-size:13px;min-width:44px}
.bar-wrap{width:80px;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .25s,background .25s}

.status-sel{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;outline:none;appearance:none;-webkit-appearance:none}
.status-sel:focus{outline:2px solid var(--blue)}
.s-pass{background:var(--green-bg);color:var(--green-tx)}
.s-fail{background:var(--red-bg);color:var(--red-tx)}
.s-na{background:var(--bg3);color:var(--tx3)}

.summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.stat{background:var(--bg2);border-radius:var(--r);padding:12px 14px}
.stat-label{font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:500;color:var(--tx)}
.stat-sub{font-size:11px;color:var(--tx3);margin-top:3px}

.actions{display:flex;gap:10px;margin-top:1.5rem;flex-wrap:wrap}
.btn{flex:1;padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;min-width:130px;transition:all .15s}
.btn:active{transform:scale(.98)}
.btn-outline{border:0.5px solid var(--bd2);background:var(--bg);color:var(--tx)}
.btn-outline:hover{background:var(--bg2)}
.btn-primary{border:none;background:var(--blue);color:#fff}
.btn-primary:hover{background:#0C447C}
.add-btn{font-size:12px;color:var(--tx2);background:none;border:0.5px dashed var(--bd2);border-radius:var(--r);padding:5px 12px;cursor:pointer;width:100%;margin-top:10px;font-family:inherit}
.add-btn:hover{background:var(--bg2)}
.del-btn{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:13px;padding:2px 6px}
.del-btn:hover{color:#E24B4A}

.thr-note{font-size:12px;color:var(--tx3);margin-left:auto}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#27500A;color:#C0DD97;font-size:13px;padding:9px 20px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:99}
.toast.show{opacity:1}

@media(max-width:600px){.settings-grid{grid-template-columns:1fr 1fr}.summary-grid{grid-template-columns:1fr 1fr}}
@media print{.actions,.add-btn,.del-btn,.add-tab-btn{display:none}body{background:#fff}.status-sel{appearance:none;-webkit-appearance:none;pointer-events:none}}
</style>
</head>
<body>
<div class="page">
<h1>Test & Assessment Tracker</h1>

<div class="card">
  <div class="card-header"><span class="badge badge-blue">Settings</span></div>
  <div class="card-body">
    <div class="settings-grid">
      <div class="field"><label>Training cohort name</label><input id="cohort" placeholder="e.g. Technical Support Batch 1"/></div>
      <div class="field"><label>Pass threshold (%)</label><input id="threshold" type="number" min="0" max="100" value="70" oninput="renderAll()"/></div>
      <div class="field"><label>Max score per test</label><input id="maxscore" type="number" min="1" value="100" oninput="renderAll()"/></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <span class="badge badge-blue">Tests</span>
    <div id="test-tabs" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    <button class="add-tab-btn" onclick="addTest()">+ Add test</button>
  </div>
  <div class="card-body">
    <div id="table-wrap"></div>
    <button class="add-btn" onclick="addTrainee()">+ Add trainee</button>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <span class="badge badge-green">Summary</span>
    <span class="thr-note" id="thr-note">Pass threshold: 70%</span>
  </div>
  <div class="card-body"><div class="summary-grid" id="summary-grid"></div></div>
</div>

<div class="actions">
  <button class="btn btn-outline" onclick="copyReport()">Copy report</button>
  <button class="btn btn-primary" onclick="window.print()">Print / Export PDF</button>
</div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
var tests = [{id:1, name:'Mid-test (Day 5)'}];
var trainees = [
  {id:1, name:'Trainee 1', scores:{1:''}},
  {id:2, name:'Trainee 2', scores:{1:''}},
  {id:3, name:'Trainee 3', scores:{1:''}},
];
var currentTest = 1;
var testCounter = 1;
var traineeCounter = 3;

function getMax() { return parseInt(document.getElementById('maxscore').value) || 100; }
function getThr() { return parseInt(document.getElementById('threshold').value) || 70; }

function getPct(raw) {
  if (raw === '' || raw === null || raw === undefined || isNaN(+raw)) return null;
  return Math.min(100, Math.round(+raw / getMax() * 100));
}

function getBarColor(pct) {
  if (pct === null) return '#B4B2A9';
  if (pct >= 80) return '#3B6D11';
  if (pct >= getThr()) return '#185FA5';
  return '#A32D2D';
}

function addTest() {
  testCounter++;
  tests.push({id: testCounter, name: 'Test ' + testCounter});
  trainees.forEach(function(t) { t.scores[testCounter] = ''; });
  currentTest = testCounter;
  renderAll();
}

function addTrainee() {
  traineeCounter++;
  var scores = {};
  tests.forEach(function(t) { scores[t.id] = ''; });
  trainees.push({id: traineeCounter, name: 'Trainee ' + traineeCounter, scores: scores});
  renderTable();
  renderSummary();
}

function removeTrainee(id) {
  trainees = trainees.filter(function(t) { return t.id !== id; });
  renderTable();
  renderSummary();
}

function setScore(traineeId, testId, val) {
  var t = trainees.find(function(x) { return x.id === traineeId; });
  if (!t) return;
  t.scores[testId] = val;

  var pct = getPct(val);
  var color = getBarColor(pct);
  var thr = getThr();

  var row = document.getElementById('row-' + traineeId);
  if (!row) return;

  var pctEl = row.querySelector('.pct-cell');
  var barEl = row.querySelector('.bar-fill');
  var statusSel = row.querySelector('.status-sel');

  if (pctEl) pctEl.textContent = pct !== null ? pct + '%' : '—';
  if (pctEl) pctEl.style.color = color;
  if (barEl) {
    barEl.style.width = (pct !== null ? pct : 0) + '%';
    barEl.style.background = color;
  }
  if (statusSel) {
    if (pct === null) {
      statusSel.value = 'na';
      statusSel.className = 'status-sel s-na';
    } else if (pct >= thr) {
      statusSel.value = 'pass';
      statusSel.className = 'status-sel s-pass';
    } else {
      statusSel.value = 'fail';
      statusSel.className = 'status-sel s-fail';
    }
  }
  renderSummary();
}

function onStatusChange(sel, traineeId) {
  var cls = {pass:'s-pass', fail:'s-fail', na:'s-na'}[sel.value] || 's-na';
  sel.className = 'status-sel ' + cls;
}

function renderTabs() {
  var wrap = document.getElementById('test-tabs');
  wrap.innerHTML = '';
  tests.forEach(function(t) {
    var div = document.createElement('div');
    div.className = 'tab' + (t.id === currentTest ? ' active' : '');
    div.textContent = t.name;
    div.onclick = function() { currentTest = t.id; renderAll(); };
    div.ondblclick = function() {
      var name = prompt('Rename test:', t.name);
      if (name && name.trim()) { t.name = name.trim(); renderTabs(); }
    };
    div.title = 'Double-click to rename';
    wrap.appendChild(div);
  });
}

function renderTable() {
  var max = getMax();
  var thr = getThr();
  var tbody = document.createElement('tbody');

  trainees.forEach(function(tr, i) {
    var raw = tr.scores[currentTest] !== undefined ? tr.scores[currentTest] : '';
    var pct = getPct(raw);
    var color = getBarColor(pct);
    var barW = pct !== null ? pct : 0;
    var statusVal = pct === null ? 'na' : pct >= thr ? 'pass' : 'fail';
    var statusCls = {pass:'s-pass', fail:'s-fail', na:'s-na'}[statusVal];
    var statusLabels = {pass:'Pass', fail:'Fail', na:'—'};

    var row = document.createElement('tr');
    row.id = 'row-' + tr.id;
    row.innerHTML =
      '<td style="color:var(--tx3);font-size:12px">' + (i+1) + '</td>' +
      '<td><input class="name-input" value="' + tr.name + '" onchange="trainees.find(x=>x.id===' + tr.id + ').name=this.value"/></td>' +
      '<td><input class="score-input" type="number" min="0" max="' + max + '" value="' + raw + '" placeholder="—"' +
          ' oninput="setScore(' + tr.id + ',' + currentTest + ',this.value)"' +
          ' onchange="setScore(' + tr.id + ',' + currentTest + ',this.value)"/></td>' +
      '<td><span class="pct-cell" style="color:' + color + '">' + (pct !== null ? pct + '%' : '—') + '</span></td>' +
      '<td>' +
        '<select class="status-sel ' + statusCls + '" onchange="onStatusChange(this,' + tr.id + ')">' +
          '<option value="pass"' + (statusVal==='pass'?' selected':'') + '>Pass</option>' +
          '<option value="fail"' + (statusVal==='fail'?' selected':'') + '>Fail</option>' +
          '<option value="na"'  + (statusVal==='na'  ?' selected':'') + '>—</option>' +
        '</select>' +
      '</td>' +
      '<td><div class="bar-wrap"><div class="bar-fill" style="width:' + barW + '%;background:' + color + '"></div></div></td>' +
      '<td><button class="del-btn" onclick="removeTrainee(' + tr.id + ')">✕</button></td>';
    tbody.appendChild(row);
  });

  var table = document.createElement('table');
  var thead = document.createElement('thead');
  thead.innerHTML = '<tr><th>#</th><th>Name</th><th>Score / ' + max + '</th><th>%</th><th>Status</th><th>Bar</th><th></th></tr>';
  table.appendChild(thead);
  table.appendChild(tbody);

  var wrap = document.getElementById('table-wrap');
  wrap.innerHTML = '';
  wrap.appendChild(table);
}

function renderSummary() {
  var thr = getThr();
  document.getElementById('thr-note').textContent = 'Pass threshold: ' + thr + '%';
  var total = trainees.length;
  var allPcts = [];
  tests.forEach(function(test) {
    trainees.forEach(function(tr) {
      var pct = getPct(tr.scores[test.id]);
      if (pct !== null) allPcts.push(pct);
    });
  });
  var avg = allPcts.length ? Math.round(allPcts.reduce(function(a,b){return a+b;},0) / allPcts.length) : 0;
  var allPass = trainees.filter(function(tr) {
    var pts = tests.map(function(t){return getPct(tr.scores[t.id]);}).filter(function(p){return p!==null;});
    return pts.length > 0 && pts.every(function(p){return p>=thr;});
  }).length;
  var hasFail = trainees.filter(function(tr) {
    var pts = tests.map(function(t){return getPct(tr.scores[t.id]);}).filter(function(p){return p!==null;});
    return pts.some(function(p){return p<thr;});
  }).length;
  document.getElementById('summary-grid').innerHTML =
    '<div class="stat"><div class="stat-label">Trainees</div><div class="stat-value">' + total + '</div><div class="stat-sub">in cohort</div></div>' +
    '<div class="stat"><div class="stat-label">Avg score</div><div class="stat-value">' + avg + '%</div><div class="stat-sub">across all tests</div></div>' +
    '<div class="stat"><div class="stat-label">All passing</div><div class="stat-value" style="color:var(--green)">' + allPass + '</div><div class="stat-sub">all tests ≥ ' + thr + '%</div></div>' +
    '<div class="stat"><div class="stat-label">Has failed</div><div class="stat-value" style="color:var(--red)">' + hasFail + '</div><div class="stat-sub">at least one test</div></div>';
}

function renderAll() { renderTabs(); renderTable(); renderSummary(); }

function copyReport() {
  var cohort = document.getElementById('cohort').value || '—';
  var thr = getThr();
  var max = getMax();
  var lines = ['TEST & ASSESSMENT REPORT\nCohort: ' + cohort + ' | Pass threshold: ' + thr + '% | Max score: ' + max + '\n'];
  tests.forEach(function(test) {
    lines.push('\n[' + test.name + ']');
    lines.push('  Name                Score    %       Status');
    trainees.forEach(function(tr) {
      var raw = tr.scores[test.id];
      var pct = getPct(raw);
      var status = pct === null ? '—' : pct >= thr ? 'PASS' : 'FAIL';
      lines.push('  ' + (tr.name+'                    ').slice(0,20) + (String(raw||'—')+'         ').slice(0,9) + ((pct!==null?pct+'%':'—')+'       ').slice(0,8) + status);
    });
  });
  navigator.clipboard.writeText(lines.join('\n')).then(function() {
    var t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2000);
  });
}

renderAll();
</script>
</body>
</html>
